<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meeting Transcriber</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; background: #f5f5f0; min-height: 100vh; padding: 1rem; }
@media (prefers-color-scheme: dark) {
  body { background: #1a1a18; color: #e0ddd4; }
  .card { background: #242420; border-color: #3a3a36; }
  input, select { background: #2e2e2a; color: #e0ddd4; border-color: #3a3a36; }
  .transcript-box { background: #2e2e2a; border-color: #3a3a36; color: #e0ddd4; }
  .status-bar { background: #2e2e2a; color: #e0ddd4; }
  .stat { background: #2e2e2a; color: #aaa; }
  .stat span { color: #e0ddd4; }
  .session-item { background: #242420; border-color: #3a3a36; }
  .session-item:hover { background: #2e2e2a; }

  .notice { background: #2e2e2a; color: #aaa; }
  .sessions h2 { color: #e0ddd4; }
  .session-name { color: #e0ddd4; }
  label { color: #aaa; }
  .header p { color: #aaa; }
}
.app { max-width: 680px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; padding-top: 0.5rem; }
.header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
.header p { font-size: 13px; color: #666; }
.card { background: #fff; border: 1px solid #e0ddd4; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
.row:last-child { margin-bottom: 0; }
label { font-size: 13px; color: #666; min-width: 90px; }
input[type=text], select { flex: 1; font-size: 14px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
input[type=text]:focus, select:focus { border-color: #888; }
.status-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f0ede8; border-radius: 8px; margin-bottom: 1rem; font-size: 13px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
.dot.recording { background: #d85a30; animation: pulse 1.2s infinite; }
.dot.paused { background: #ef9f27; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
button { font-size: 13px; cursor: pointer; border-radius: 8px; padding: 8px 16px; font-family: inherit; font-weight: 500; }
.btn-primary { background: #4a4a46; color: #ffffff; border: 1px solid #4a4a46; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-secondary { background: #3a3a36; color: #e0ddd4; border: 1px solid #5a5a56; }
.btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-danger { background: transparent; color: #d85a30; border: 1px solid #d85a30; }
.transcript-box { min-height: 220px; max-height: 380px; overflow-y: auto; background: #f5f5f0; border-radius: 8px; padding: 14px; font-size: 14px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; border: 1px solid #e0ddd4; }
.interim { color: #999; font-style: italic; }
.stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; }
.stat { background: #f0ede8; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #666; }
.stat span { font-size: 16px; font-weight: 600; color: #1a1a1a; display: block; }
.sessions { margin-top: 1.5rem; }
.sessions h2 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.session-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border: 1px solid #e0ddd4; border-radius: 8px; margin-bottom: 6px; font-size: 13px; background: #fff; flex-wrap: wrap; gap: 8px; }
.session-name { font-weight: 600; }
.session-meta { font-size: 11px; color: #888; margin-top: 2px; }
.session-actions { display: flex; gap: 6px; }
.empty-state { text-align: center; padding: 2rem; color: #aaa; font-size: 13px; }
.notice { font-size: 12px; color: #666; background: #f0ede8; padding: 8px 12px; border-radius: 8px; margin-bottom: 1rem; border-left: 3px solid #ccc; line-height: 1.5; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Meeting Transcriber</h1>
    <p>Runs entirely in your browser. No data leaves your device.</p>
  </div>

  <div class="notice" id="notice">Checking browser support...</div>

  <div class="card">
    <div class="row">
      <label>Session name</label>
      <input type="text" id="sessionName" placeholder="e.g. standup_monday" />
    </div>
    <div class="row">
      <label>Language</label>
      <select id="langSelect">
        <option value="en-US">English (US)</option>
        <option value="en-GB">English (UK)</option>
        <option value="hi-IN">Hindi</option>
        <option value="es-ES">Spanish</option>
        <option value="fr-FR">French</option>
        <option value="de-DE">German</option>
        <option value="pt-BR">Portuguese (BR)</option>
        <option value="ja-JP">Japanese</option>
        <option value="zh-CN">Chinese (Simplified)</option>
      </select>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Ready — press Start to begin</span>
  </div>

  <div class="stats">
    <div class="stat"><span id="wordCount">0</span>words</div>
    <div class="stat"><span id="duration">0:00</span>duration</div>
    <div class="stat"><span id="chunkCount">0</span>chunks saved</div>
  </div>

  <div class="controls">
    <button class="btn-primary" id="startBtn">Start recording</button>
    <button class="btn-secondary" id="pauseBtn" disabled>Pause</button>
    <button class="btn-secondary" id="stopBtn" disabled>Stop &amp; save</button>
    <button class="btn-danger" id="discardBtn" disabled>Discard</button>
    <button class="btn-secondary" id="exportBtn" disabled>Export .txt</button>
  </div>

  <div class="transcript-box" id="transcriptBox">
    <span style="color:#aaa;font-size:13px;">Transcript will appear here as you speak...</span>
  </div>

  <div class="sessions" id="sessionsPanel">
    <h2>Saved sessions</h2>
    <div id="sessionsList"></div>
  </div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const notice = document.getElementById('notice');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const stopBtn = document.getElementById('stopBtn');
const discardBtn = document.getElementById('discardBtn');
const exportBtn = document.getElementById('exportBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const transcriptBox = document.getElementById('transcriptBox');
const wordCountEl = document.getElementById('wordCount');
const durationEl = document.getElementById('duration');
const chunkCountEl = document.getElementById('chunkCount');
const sessionNameEl = document.getElementById('sessionName');
const langSelect = document.getElementById('langSelect');

let recognition = null;
let fullTranscript = '';
let interimEl = null;
let startTime = null;
let timerInterval = null;
let chunkCount = 0;
let isPaused = false;
let isRecording = false;
let sessions = [];

if (!SpeechRecognition) {
  notice.textContent = 'This browser does not support Speech Recognition. Please use Chrome on Android or Safari on iOS.';
  notice.style.borderLeftColor = '#d85a30';
  startBtn.disabled = true;
} else {
  notice.textContent = 'Ready. Works best on Chrome (Android) or Safari (iOS). Point your phone mic toward the speaker.';
  notice.style.borderLeftColor = '#1D9E75';
}

function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem('transcriber_sessions') || '[]'); } catch(e) { sessions = []; }
  renderSessions();
}

function saveSessions() {
  try { localStorage.setItem('transcriber_sessions', JSON.stringify(sessions)); } catch(e) {}
}

function renderSessions() {
  const list = document.getElementById('sessionsList');
  if (!sessions.length) { list.innerHTML = '<div class="empty-state">No saved sessions yet</div>'; return; }
  list.innerHTML = sessions.slice().reverse().map((s, ri) => {
    const i = sessions.length - 1 - ri;
    return `<div class="session-item">
      <div><div class="session-name">${s.name}</div><div class="session-meta">${s.date} · ${s.words} words · ${s.duration}</div></div>
      <div class="session-actions">
        <button class="btn-secondary" style="font-size:12px;padding:5px 10px" onclick="viewSession(${i})">View</button>
        <button class="btn-secondary" style="font-size:12px;padding:5px 10px" onclick="downloadSession(${i})">Export</button>
        <button style="font-size:12px;padding:5px 10px;background:transparent;border:1px solid #d85a30;color:#d85a30;border-radius:8px;cursor:pointer;font-family:inherit" onclick="deleteSession(${i})">Delete</button>
      </div></div>`;
  }).join('');
}

function viewSession(i) {
  const s = sessions[i];
  transcriptBox.innerHTML = '';
  transcriptBox.textContent = s.transcript;
  exportBtn.disabled = false;
  sessionNameEl.value = s.name;
  fullTranscript = s.transcript;
}

function downloadSession(i) {
  const s = sessions[i];
  const blob = new Blob([`Session: ${s.name}\nDate: ${s.date}\nDuration: ${s.duration}\n\n${s.transcript}`], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `${s.name.replace(/\s+/g,'_')}_transcript.txt`; a.click();
  URL.revokeObjectURL(url);
}

function deleteSession(i) {
  if (!confirm('Delete this session?')) return;
  sessions.splice(i, 1); saveSessions(); renderSessions();
}

window.viewSession = viewSession;
window.downloadSession = downloadSession;
window.deleteSession = deleteSession;

function updateStats() {
  wordCountEl.textContent = fullTranscript.trim().split(/\s+/).filter(Boolean).length;
  chunkCountEl.textContent = chunkCount;
}

function updateDuration() {
  if (!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  durationEl.textContent = `${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}`;
}

function setupRecognition() {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = langSelect.value;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    statusDot.className = 'dot recording';
    statusText.textContent = 'Recording — speak clearly toward the mic';
    if (!startTime) { startTime = Date.now(); timerInterval = setInterval(updateDuration, 1000); }
  };

  recognition.onresult = (e) => {
    let interim = '', newFinal = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) { newFinal += t + ' '; } else { interim += t; }
    }
    if (newFinal) {
      if (interimEl) { interimEl.remove(); interimEl = null; }
      fullTranscript += newFinal;
      const span = document.createElement('span'); span.textContent = newFinal;
      transcriptBox.appendChild(span);
      chunkCount++; updateStats();
      transcriptBox.scrollTop = transcriptBox.scrollHeight;
    }
    if (interim) {
      if (!interimEl) { interimEl = document.createElement('span'); interimEl.className = 'interim'; transcriptBox.appendChild(interimEl); }
      interimEl.textContent = interim;
      transcriptBox.scrollTop = transcriptBox.scrollHeight;
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') { statusText.textContent = 'Microphone access denied — allow mic in browser settings'; statusDot.className = 'dot'; return; }
    statusText.textContent = `Error: ${e.error} — restarting...`;
  };

  recognition.onend = () => { if (isRecording && !isPaused) { try { recognition.start(); } catch(e) {} } };
}

startBtn.addEventListener('click', () => {
  if (!SpeechRecognition) return;
  const name = sessionNameEl.value.trim() || `meeting_${new Date().toISOString().slice(0,10)}`;
  sessionNameEl.value = name;
  transcriptBox.innerHTML = ''; fullTranscript = ''; chunkCount = 0; startTime = null; isPaused = false; isRecording = true;
  startBtn.disabled = true; pauseBtn.disabled = false; stopBtn.disabled = false; discardBtn.disabled = false; exportBtn.disabled = true; langSelect.disabled = true;
  setupRecognition(); recognition.start();
});

pauseBtn.addEventListener('click', () => {
  if (!isPaused) {
    isPaused = true; recognition.stop(); clearInterval(timerInterval);
    statusDot.className = 'dot paused'; statusText.textContent = 'Paused — press Resume to continue'; pauseBtn.textContent = 'Resume';
  } else {
    isPaused = false; pauseBtn.textContent = 'Pause'; statusText.textContent = 'Resuming...';
    timerInterval = setInterval(updateDuration, 1000); recognition.start();
  }
});

stopBtn.addEventListener('click', () => {
  isRecording = false; isPaused = false; recognition.stop(); clearInterval(timerInterval);
  statusDot.className = 'dot'; statusText.textContent = 'Stopped — session saved';
  const elapsed = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
  sessions.push({ name: sessionNameEl.value.trim(), date: new Date().toLocaleString(), transcript: fullTranscript, words: fullTranscript.trim().split(/\s+/).filter(Boolean).length, duration: `${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}` });
  saveSessions(); renderSessions();
  startBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true; discardBtn.disabled = true; exportBtn.disabled = false; langSelect.disabled = false; pauseBtn.textContent = 'Pause';
});

discardBtn.addEventListener('click', () => {
  if (!confirm('Discard this recording?')) return;
  isRecording = false; isPaused = false; recognition.stop(); clearInterval(timerInterval);
  transcriptBox.innerHTML = '<span style="color:#aaa;font-size:13px;">Transcript will appear here as you speak...</span>';
  fullTranscript = ''; chunkCount = 0; wordCountEl.textContent = '0'; durationEl.textContent = '0:00'; chunkCountEl.textContent = '0';
  statusDot.className = 'dot'; statusText.textContent = 'Discarded — ready for a new session';
  startBtn.disabled = false; pauseBtn.disabled = true; stopBtn.disabled = true; discardBtn.disabled = true; exportBtn.disabled = true; langSelect.disabled = false; pauseBtn.textContent = 'Pause';
});

exportBtn.addEventListener('click', () => {
  const name = sessionNameEl.value.trim() || 'transcript';
  const blob = new Blob([`Session: ${name}\nDate: ${new Date().toLocaleString()}\n\n${fullTranscript}`], {type:'text/plain'});
  const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${name.replace(/\s+/g,'_')}.txt`; a.click(); URL.revokeObjectURL(url);
});

loadSessions();
</script>
</body>
</html>
